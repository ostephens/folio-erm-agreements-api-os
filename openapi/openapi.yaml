openapi: 3.2.0
info:
  version: 7.3.0
  title: Folio ERM Agreements
  description: API for the Folio library services platform mod-agreements app
servers:
  - url: 'https://folio-snapshot-okapi.dev.folio.org'
  - url: 'https://folio-snapshot-2-okapi.dev.folio.org'
paths:
  # ===== Subscription Agreements (sas) =====
  # Full CRUD: GET (list), POST (create)
  /erm/sas:
    $ref: paths/erm_sas.yaml
  # Full CRUD: GET, PUT, DELETE
  /erm/sas/{agreementId}:
    $ref: paths/erm_sas_{agreementId}.yaml
  # Agreement resources
  /erm/sas/{agreementId}/resources:
    $ref: paths/erm_sas_{agreementId}_resources.yaml
  /erm/sas/{agreementId}/resources/all:
    $ref: paths/erm_sas_{agreementId}_resources_all.yaml
  /erm/sas/{agreementId}/resources/current:
    $ref: paths/erm_sas_{agreementId}_resources_current.yaml
  /erm/sas/{agreementId}/resources/future:
    $ref: paths/erm_sas_{agreementId}_resources_future.yaml
  /erm/sas/{agreementId}/resources/dropped:
    $ref: paths/erm_sas_{agreementId}_resources_dropped.yaml
  # Agreement static resources (PCIs only)
  /erm/sas/{agreementId}/resources/static:
    $ref: paths/erm_sas_{agreementId}_resources_static.yaml
  /erm/sas/{agreementId}/resources/static/all:
    $ref: paths/erm_sas_{agreementId}_resources_static_all.yaml
  /erm/sas/{agreementId}/resources/static/current:
    $ref: paths/erm_sas_{agreementId}_resources_static_current.yaml
  /erm/sas/{agreementId}/resources/static/dropped:
    $ref: paths/erm_sas_{agreementId}_resources_static_dropped.yaml
  /erm/sas/{agreementId}/resources/static/future:
    $ref: paths/erm_sas_{agreementId}_resources_static_future.yaml
  # Agreement resource export
  /erm/sas/{agreementId}/resources/export:
    $ref: paths/erm_sas_{agreementId}_resources_export.yaml
  /erm/sas/{agreementId}/resources/export/{format}:
    $ref: paths/erm_sas_{agreementId}_resources_export_{format}.yaml
  /erm/sas/{agreementId}/resources/export/current:
    $ref: paths/erm_sas_{agreementId}_resources_export_current.yaml
  /erm/sas/{agreementId}/resources/export/current/{format}:
    $ref: paths/erm_sas_{agreementId}_resources_export_current_{format}.yaml
  /erm/sas/{agreementId}/resources/export/all:
    $ref: paths/erm_sas_{agreementId}_resources_export_all.yaml
  /erm/sas/{agreementId}/resources/export/all/{format}:
    $ref: paths/erm_sas_{agreementId}_resources_export_all_{format}.yaml
  # Agreement export (agreement-level, not resources)
  /erm/sas/{agreementId}/export:
    $ref: paths/erm_sas_{agreementId}_export.yaml
  /erm/sas/{agreementId}/export/current:
    $ref: paths/erm_sas_{agreementId}_export_current.yaml
  # Agreement clone
  /erm/sas/{agreementId}/clone:
    $ref: paths/erm_sas_{agreementId}_clone.yaml
  # Agreement sub-resources
  /erm/sas/{agreementId}/linkedLicenses:
    $ref: paths/erm_sas_{agreementId}_linkedLicenses.yaml
  /erm/sas/{agreementId}/usageDataProviders:
    $ref: paths/erm_sas_{agreementId}_usageDataProviders.yaml
  # Agreement collection-level endpoints
  /erm/sas/publicLookup:
    $ref: paths/erm_sas_publicLookup.yaml
  /erm/sas/linkedLicenses:
    $ref: paths/erm_sas_linkedLicenses.yaml
  /erm/sas/usageDataProviders:
    $ref: paths/erm_sas_usageDataProviders.yaml
  /erm/sas/validate/{prop}:
    $ref: paths/erm_sas_validate_{prop}.yaml

  # ===== Entitlements =====
  # CRUD: GET (list), POST (create) — no PATCH
  /erm/entitlements:
    $ref: paths/erm_entitlements.yaml
  /erm/entitlements/{entitlementId}:
    $ref: paths/erm_entitlements_{entitlementId}.yaml
  /erm/entitlements/external:
    $ref: paths/erm_entitlements_external.yaml

  # ===== Entitlement Log Entries =====
  # Full CRUD
  /erm/entitlementLogEntry:
    $ref: paths/erm_entitlementLogEntry.yaml
  /erm/entitlementLogEntry/{entitlementLogEntryId}:
    $ref: paths/erm_entitlementLogEntry_{entitlementLogEntryId}.yaml

  # ===== Packages =====
  # Full CRUD
  /erm/packages:
    $ref: paths/erm_packages.yaml
  /erm/packages/{packageId}:
    $ref: paths/erm_packages_{packageId}.yaml
  # Package content
  /erm/packages/{packageId}/content:
    $ref: paths/erm_packages_{packageId}_content.yaml
  /erm/packages/{packageId}/content/all:
    $ref: paths/erm_packages_{packageId}_content_all.yaml
  /erm/packages/{packageId}/content/current:
    $ref: paths/erm_packages_{packageId}_content_current.yaml
  /erm/packages/{packageId}/content/future:
    $ref: paths/erm_packages_{packageId}_content_future.yaml
  /erm/packages/{packageId}/content/dropped:
    $ref: paths/erm_packages_{packageId}_content_dropped.yaml
  # Package metadata
  /erm/packages/{packageId}/metadata:
    $ref: paths/erm_packages_{packageId}_metadata.yaml
  # Package collection-level operations
  /erm/packages/import:
    $ref: paths/erm_packages_import.yaml
  /erm/packages/tsvParse:
    $ref: paths/erm_packages_tsvParse.yaml
  /erm/packages/sources:
    $ref: paths/erm_packages_sources.yaml
  /erm/packages/controlSync:
    $ref: paths/erm_packages_controlSync.yaml
  # Package ingress metadata (collection-level, GET only)
  /erm/packages/metadata:
    $ref: paths/erm_packages_metadata.yaml
  /erm/packages/metadata/{metadataId}:
    $ref: paths/erm_packages_metadata_{metadataId}.yaml

  # ===== Package Content Items (pci) =====
  # CRUD: GET (list), POST (create), GET/PUT (individual) — no DELETE
  /erm/pci:
    $ref: paths/erm_pci.yaml
  /erm/pci/{pciId}:
    $ref: paths/erm_pci_{pciId}.yaml

  # ===== Platforms =====
  # Full CRUD
  /erm/platforms:
    $ref: paths/erm_platforms.yaml
  /erm/platforms/{platformId}:
    $ref: paths/erm_platforms_{platformId}.yaml

  # ===== Platform Title Instances (pti) =====
  # GET only
  /erm/pti:
    $ref: paths/erm_pti.yaml
  /erm/pti/{ptiId}:
    $ref: paths/erm_pti_{ptiId}.yaml

  # ===== Titles =====
  # GET only
  /erm/titles:
    $ref: paths/erm_titles.yaml
  /erm/titles/{titleId}:
    $ref: paths/erm_titles_{titleId}.yaml
  /erm/titles/entitled:
    $ref: paths/erm_titles_entitled.yaml
  /erm/titles/electronic:
    $ref: paths/erm_titles_electronic.yaml

  # ===== ERM Resources =====
  # GET only (list and individual)
  /erm/resource:
    $ref: paths/erm_resource.yaml
  /erm/resource/{resourceId}:
    $ref: paths/erm_resource_{resourceId}.yaml
  /erm/resource/electronic:
    $ref: paths/erm_resource_electronic.yaml
  /erm/resource/{resourceId}/entitlementOptions:
    $ref: paths/erm_resource_{resourceId}_entitlementOptions.yaml
  /erm/resource/{resourceId}/static/entitlementOptions:
    $ref: paths/erm_resource_{resourceId}_static_entitlementOptions.yaml
  /erm/resource/{resourceId}/entitlements:
    $ref: paths/erm_resource_{resourceId}_entitlements.yaml
  /erm/resource/{resourceId}/entitlements/related:
    $ref: paths/erm_resource_{resourceId}_entitlements_related.yaml
  # Resource deletion operations
  /erm/resource/markForDelete/pkg:
    $ref: paths/erm_resource_markForDelete_pkg.yaml
  /erm/resource/markForDelete/pci:
    $ref: paths/erm_resource_markForDelete_pci.yaml
  /erm/resource/markForDelete/pti:
    $ref: paths/erm_resource_markForDelete_pti.yaml
  /erm/resource/markForDelete/ti:
    $ref: paths/erm_resource_markForDelete_ti.yaml
  /erm/resource/delete/pkg:
    $ref: paths/erm_resource_delete_pkg.yaml
  /erm/resource/delete/pci:
    $ref: paths/erm_resource_delete_pci.yaml
  /erm/resource/delete/pti:
    $ref: paths/erm_resource_delete_pti.yaml
  /erm/resource/delete/ti:
    $ref: paths/erm_resource_delete_ti.yaml

  # ===== Remote Knowledge Bases (kbs) =====
  # Full CRUD
  /erm/kbs:
    $ref: paths/erm_kbs.yaml
  /erm/kbs/{kbId}:
    $ref: paths/erm_kbs_{kbId}.yaml

  # ===== Organisations =====
  # Full CRUD
  /erm/org:
    $ref: paths/erm_org.yaml
  /erm/org/{orgId}:
    $ref: paths/erm_org_{orgId}.yaml
  /erm/org/find/{id}:
    $ref: paths/erm_org_find_{id}.yaml

  # ===== Internal Contacts =====
  # GET only
  /erm/contacts:
    $ref: paths/erm_contacts.yaml
  /erm/contacts/{contactId}:
    $ref: paths/erm_contacts_{contactId}.yaml

  # ===== Reference Data =====
  # Full CRUD
  /erm/refdata:
    $ref: paths/erm_refdata.yaml
  /erm/refdata/{refdataId}:
    $ref: paths/erm_refdata_{refdataId}.yaml
  /erm/refdata/{domain}/{property}:
    $ref: paths/erm_refdata_{domain}_{property}.yaml

  # ===== Custom Property Definitions =====
  # Full CRUD
  /erm/custprops:
    $ref: paths/erm_custprops.yaml
  /erm/custprops/{custpropId}:
    $ref: paths/erm_custprops_{custpropId}.yaml
  /erm/custprops/contexts:
    $ref: paths/erm_custprops_contexts.yaml

  # ===== String Templates =====
  # Full CRUD
  /erm/sts:
    $ref: paths/erm_sts.yaml
  /erm/sts/{stringTemplateId}:
    $ref: paths/erm_sts_{stringTemplateId}.yaml
  /erm/sts/template:
    $ref: paths/erm_sts_template.yaml
  /erm/sts/template/{id}:
    $ref: paths/erm_sts_template_{id}.yaml

  # ===== Jobs =====
  # GET (list), DELETE (individual) — create via /erm/jobs/{jobType}
  /erm/jobs:
    $ref: paths/erm_jobs.yaml
  /erm/jobs/{jobId}:
    $ref: paths/erm_jobs_{jobId}.yaml
  /erm/jobs/{jobType}:
    $ref: paths/erm_jobs_{jobType}.yaml
  /erm/jobs/type/{jobType}:
    $ref: paths/erm_jobs_type_{jobType}.yaml
  # Job log endpoints
  /erm/jobs/{jobId}/fullLog:
    $ref: paths/erm_jobs_{jobId}_fullLog.yaml
  /erm/jobs/{jobId}/fullLogStream:
    $ref: paths/erm_jobs_{jobId}_fullLogStream.yaml
  /erm/jobs/{jobId}/errorLog:
    $ref: paths/erm_jobs_{jobId}_errorLog.yaml
  /erm/jobs/{jobId}/errorLogStream:
    $ref: paths/erm_jobs_{jobId}_errorLogStream.yaml
  /erm/jobs/{jobId}/infoLog:
    $ref: paths/erm_jobs_{jobId}_infoLog.yaml
  /erm/jobs/{jobId}/infoLogStream:
    $ref: paths/erm_jobs_{jobId}_infoLogStream.yaml
  /erm/jobs/{jobId}/downloadFileObject:
    $ref: paths/erm_jobs_{jobId}_downloadFileObject.yaml

  # ===== Files =====
  # GET (list), POST (upload), GET/DELETE (individual) — no PUT/PATCH
  /erm/files:
    $ref: paths/erm_files.yaml
  /erm/files/{fileId}:
    $ref: paths/erm_files_{fileId}.yaml
  /erm/files/{fileId}/raw:
    $ref: paths/erm_files_{fileId}_raw.yaml

  # ===== Identifiers =====
  # GET only
  /erm/identifiers:
    $ref: paths/erm_identifiers.yaml
  /erm/identifiers/{identifierId}:
    $ref: paths/erm_identifiers_{identifierId}.yaml
  /erm/identifiers/namespaces:
    $ref: paths/erm_identifiers_namespaces.yaml

  # ===== Comparison =====
  /erm/compare:
    $ref: paths/erm_compare.yaml

  # ===== Validation =====
  /erm/validate/{domain}/{prop}:
    $ref: paths/erm_validate_{domain}_{prop}.yaml

  # ===== Settings =====
  # Full CRUD
  /erm/settings/appSettings:
    $ref: paths/erm_settings_appSettings.yaml
  /erm/settings/appSettings/{settingId}:
    $ref: paths/erm_settings_appSettings_{settingId}.yaml

  # ===== Admin =====
  /erm/admin/{action}:
    $ref: paths/erm_admin_{action}.yaml

  # ===== Statistics =====
  /erm/statistics/kbCount:
    $ref: paths/erm_statistics_kbCount.yaml
  /erm/statistics/sasCount:
    $ref: paths/erm_statistics_sasCount.yaml

  # ===== PushKB =====
  /erm/pushKB/pkg:
    $ref: paths/erm_pushKB_pkg.yaml
  /erm/pushKB/pci:
    $ref: paths/erm_pushKB_pci.yaml
  # PushKB sessions (GET only)
  /erm/pushKB/sessions:
    $ref: paths/erm_pushKB_sessions.yaml
  /erm/pushKB/sessions/{sessionId}:
    $ref: paths/erm_pushKB_sessions_{sessionId}.yaml
  # PushKB chunks (GET only, with log sub-endpoints)
  /erm/pushKB/chunks:
    $ref: paths/erm_pushKB_chunks.yaml
  /erm/pushKB/chunks/{chunkId}:
    $ref: paths/erm_pushKB_chunks_{chunkId}.yaml
  /erm/pushKB/chunks/{chunkId}/fullLog:
    $ref: paths/erm_pushKB_chunks_{chunkId}_fullLog.yaml
  /erm/pushKB/chunks/{chunkId}/fullLogStream:
    $ref: paths/erm_pushKB_chunks_{chunkId}_fullLogStream.yaml
  /erm/pushKB/chunks/{chunkId}/errorLog:
    $ref: paths/erm_pushKB_chunks_{chunkId}_errorLog.yaml
  /erm/pushKB/chunks/{chunkId}/errorLogStream:
    $ref: paths/erm_pushKB_chunks_{chunkId}_errorLogStream.yaml
  /erm/pushKB/chunks/{chunkId}/infoLog:
    $ref: paths/erm_pushKB_chunks_{chunkId}_infoLog.yaml
  /erm/pushKB/chunks/{chunkId}/infoLogStream:
    $ref: paths/erm_pushKB_chunks_{chunkId}_infoLogStream.yaml

  # ===== Subscribed Content =====
  /erm/content:
    $ref: paths/erm_content.yaml
  /erm/content/{action}:
    $ref: paths/erm_content_{action}.yaml

  # ===== Codex =====
  /codex-instances:
    $ref: paths/codex-instances.yaml
  /codex-instances/{id}:
    $ref: paths/codex-instances_{id}.yaml

  # ===== Top-level Export =====
  /export:
    $ref: paths/export.yaml
  /export/{format}:
    $ref: paths/export_{format}.yaml
  /export/current:
    $ref: paths/export_current.yaml
  /export/current/{format}:
    $ref: paths/export_current_{format}.yaml

  # ===== Dashboard =====
  /dashboard/definitions:
    $ref: paths/dashboard_definitions.yaml
components:
  securitySchemes:
    api_key:
        type: apiKey
        in: header
        name: x-okapi-token